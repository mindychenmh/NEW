
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>廠商開發進度甘特圖（含下拉選單）</title>

<style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #999; padding: 8px; text-align: center; }
    th { background: #f2f2f2; }
    .gantt-container { height: 20px; background: #eee; position: relative; }
    .gantt-bar {
        height: 20px;
        background: #4CAF50;
        border-radius: 4px;
        position: absolute;
        cursor: grab;
    }
</style>

<script>
// 開發進度的百分比對應
const progressMap = {
    "已簽約": 100,
    "審約中": 80,
    "洽談中": 60,
    "廠商評估中": 40,
    "已提供簡介": 30,
    "尋找 KEY MEN": 0
};

document.addEventListener("DOMContentLoaded", () => {
    // 套用百分比至甘特條
    document.querySelectorAll(".progress-select").forEach(select => {
        const bar = select.closest("tr").querySelector(".gantt-bar");
        const updateBar = () => {
            const percent = progressMap[select.value] || 0;
            bar.style.width = percent + "%";
        };
        select.addEventListener("change", updateBar);
        updateBar();
    });

    // 甘特條可拖曳
    document.querySelectorAll(".gantt-bar").forEach(bar => {
        let isDragging = false;
        let startX = 0;
        let startLeft = 0;

        bar.addEventListener("mousedown", e => {
            isDragging = true;
            startX = e.clientX;
            startLeft = parseInt(bar.style.left) || 0;
            bar.style.cursor = "grabbing";
        });

        document.addEventListener("mousemove", e => {
            if (!isDragging) return;
            let diff = e.clientX - startX;
            bar.style.left = Math.max(0, startLeft + diff) + "px";
        });

        document.addEventListener("mouseup", () => {
            isDragging = false;
            bar.style.cursor = "grab";
        });
    });
});
</script>

</head>
<body>

<h1>廠商開發進度甘特圖（含下拉選單）</h1>

<table>
<thead>
<tr>
    <th>廠商名稱</th>
    <th>品牌名</th>
    <th>開發進度</th>
    <th>首次聯繫</th>
    <th>上次聯繫</th>
    <th>再次聯繫日</th>
    <th>甘特圖</th>
</tr>
</thead>

<tbody>

<tr>
    <td>範例A</td>
    <td>品牌A</td>
    <td>
        <select class="progress-select">
            <option>洽談中</option>
            <option>已簽約</option>
            <option>審約中</option>
            <option>廠商評估中</option>
            <option>已提供簡介</option>
            <option>尋找 KEY MEN</option>
        </select>
    </td>
    <td>2026-03-01</td>
    <td>2026-03-10</td>
    <td>2026-03-20</td>
    <td>
        <div class="gantt-container">
            <div class="gantt-bar" style="left:0px;"></div>
        </div>
    </td>
</tr>

<tr>
    <td>範例B</td>
    <td>品牌B</td>
    <td>
        <select class="progress-select">
            <option>審約中</option>
            <option>已簽約</option>
            <option>洽談中</option>
            <option>廠商評估中</option>
            <option>已提供簡介</option>
            <option>尋找 KEY MEN</option>
        </select>
    </td>
    <td>2026-02-20</td>
    <td>2026-03-05</td>
    <td>2026-03-25</td>
    <td>
        <div class="gantt-container">
            <div class="gantt-bar" style="left:0px;"></div>
        </div>
    </td>
</tr>

<tr>
    <td>範例C</td>
    <td>品牌C</td>
    <td>
        <select class="progress-select">
            <option>尋找 KEY MEN</option>
            <option>已簽約</option>
            <option>審約中</option>
            <option>洽談中</option>
            <option>廠商評估中</option>
            <option>已提供簡介</option>
        </select>
    </td>
    <td>2026-03-05</td>
    <td>2026-03-05</td>
    <td>2026-03-18</td>
    <td>
        <div class="gantt-container">
            <div class="gantt-bar" style="left:0px;"></div>
        </div>
    </td>
</tr>

</tbody>
</table>

</body>
</html>
